name: Lint

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1.5"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      # Curated config lives in .luacheckrc (std=lua51, WoW API read_globals,
      # spec/ excluded). Zero warnings is the gate — matches the milestone-audit
      # and Phase 7 success criterion.
      - name: Run luacheck
        run: luacheck Duncedmaxxing/
