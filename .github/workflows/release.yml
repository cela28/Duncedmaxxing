name: Release

on:
  release:
    types: [created]
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and tools
        run: |
          sudo apt-get update && sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks
          sudo luarocks install luacheck
          sudo luarocks install busted

      - name: Lint
        run: luacheck Duncedmaxxing/

      - name: Test
        run: busted spec/

  package-release:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject version into TOC
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Injecting version: $VERSION"
          sed -i "s/^## Version: .*/## Version: $VERSION/" Duncedmaxxing/Duncedmaxxing.toc

      - name: Create zip
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          zip -r "Duncedmaxxing-$VERSION.zip" Duncedmaxxing/

      - name: Upload release asset
        uses: softprops/action-gh-release@c062e08bd532815e2082a07b400ef65ab24e279c  # v2.3.2
        with:
          files: Duncedmaxxing-*.zip
          prerelease: ${{ github.event.release.prerelease }}
          generate_release_notes: true
